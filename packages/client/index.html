<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NodeLens</title>
    <link rel="stylesheet" href="src/style.css" />
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        font-family: var(--nl-font-family-sans);
        font-size: var(--nl-font-size-base);
        line-height: var(--nl-line-height-base);
        background-color: var(--nl-surface-app);
        color: var(--nl-text-primary);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      .nl-page {
        max-width: 720px;
        margin: 0 auto;
        padding: 4rem 1.5rem;
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
      }
      .nl-page h1 { margin: 0; font-size: 1.5rem; font-weight: 600; display: flex; align-items: center; gap: 0.6rem; }
      .nl-page p { margin: 0; color: var(--nl-text-secondary); }
      .nl-brand-mark {
        width: 28px; height: 28px; border-radius: 50%;
        background: var(--nl-color-primary); color: var(--nl-text-on-primary);
        display: inline-flex; align-items: center; justify-content: center;
      }
      .nl-hint {
        margin-top: 0.5rem; font-family: var(--nl-font-family-mono, monospace); font-size: 0.85rem;
        color: var(--nl-text-secondary);
      }
      .nl-hint kbd {
        background: var(--nl-surface-raised); border: 1px solid var(--nl-surface-border);
        border-radius: 4px; padding: 0.1rem 0.4rem;
      }
    </style>
  </head>
  <body>
    <main class="nl-page">
      <h1>
        <span class="nl-brand-mark"><nl-codicon icon="search"></nl-codicon></span>
        NodeLens
      </h1>
      <p>Live view of what this app is doing right now: requests, database queries, and logs.</p>
      <p class="nl-hint">Toggle the panel with <kbd>Ctrl/Cmd</kbd> + <kbd>Shift</kbd> + <kbd>L</kbd></p>
    </main>

    <node-lens></node-lens>

    <script type="module" src="src/index.ts"></script>
    <script>
      document.addEventListener('DOMContentLoaded', () => {
        const client = new NodeLensClient();
        const nodeLens = document.querySelector('node-lens');
        client.addEventListener('connectionStateChange', (e) => {
          nodeLens.state = e.detail;
          nodeLens.pushContent = true;
        });
        client.connect("http://localhost:3000/node-lens/events");
      });
    </script>
  </body>
</html>
