version: '3.8'

services:
  postgres:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_DB: nodelens_todo
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mysql:
    image: mysql:8
    restart: always
    environment:
      MYSQL_DATABASE: nodelens_todo
      MYSQL_USER: user
      MYSQL_PASSWORD: password
      MYSQL_ROOT_PASSWORD: rootpassword
    ports:
      - '3307:3306'
    volumes:
      - mysql_data:/var/lib/mysql

  mongodb:
    image: mongo:7
    restart: always
    environment:
      MONGO_INITDB_DATABASE: nodelens_todo
      MONGO_INITDB_ROOT_USERNAME: user
      MONGO_INITDB_ROOT_PASSWORD: password
    ports:
      - '27017:27017'
    volumes:
      - mongodb_data:/data/db

  redis:
    image: redis:7
    restart: always
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

  memcached:
    image: memcached:1.6
    restart: always
    ports:
      - '11211:11211'

volumes:
  postgres_data:
  mysql_data:
  mongodb_data:
  redis_data:
